<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#FACF00;
    --green:#76BD2A;
    --slate:#3E4346;
    --slate-deep:#26292B;
    --paper:#F6F4EF;
    --line:#DAD6CC;
    --ink:#232525;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    background-image:
      repeating-linear-gradient(0deg, rgba(62,67,70,0.035) 0px, rgba(62,67,70,0.035) 1px, transparent 1px, transparent 42px),
      repeating-linear-gradient(90deg, rgba(62,67,70,0.035) 0px, rgba(62,67,70,0.035) 1px, transparent 1px, transparent 42px);
  }

  header{
    background:var(--slate-deep);
    border-bottom:none;
    padding:34px 6vw 0;
    position:relative;
    overflow:hidden;
  }

  .logo-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    padding-bottom:22px;
  }

  .logo-row img{
    height:44px;
    display:block;
  }

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#9BA0A2;
  }

  .ruler{
    height:14px;
    display:flex;
    align-items:flex-end;
  }
  .ruler .tick{
    flex:1;
    border-left:1px solid rgba(250,207,0,0.4);
    height:6px;
  }
  .ruler .tick:nth-child(4n+1){ height:14px; border-left-color:var(--yellow); }

  main{
    padding:44px 6vw 80px;
    max-width:1180px;
    margin:0 auto;
  }

  .intro{
    max-width:640px;
    margin-bottom:44px;
  }
  .intro h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px;
    font-weight:600;
    margin-bottom:10px;
  }
  .intro p{
    font-size:14.5px;
    line-height:1.6;
    color:#54595B;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:22px;
  }

  .card{
    position:relative;
    background:#fff;
    border:1px solid var(--line);
    padding:24px 22px 22px;
    display:flex;
    flex-direction:column;
    min-height:190px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 24px rgba(35,37,37,0.10);
  }

  .corner{
    position:absolute;
    width:14px;
    height:14px;
    opacity:0;
    transition:opacity 0.15s ease;
    pointer-events:none;
  }
  .card:hover .corner{ opacity:1; }
  .corner.tl{ top:-1px; left:-1px; border-top:2px solid var(--yellow); border-left:2px solid var(--yellow); }
  .corner.br{ bottom:-1px; right:-1px; border-bottom:2px solid var(--yellow); border-right:2px solid var(--yellow); }

  .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:2px;
    width:fit-content;
    margin-bottom:14px;
  }
  .tag.proj{ background:rgba(118,189,42,0.14); color:#4C8515; }
  .tag.draw{ background:rgba(250,207,0,0.18); color:#8A6E00; }
  .tag.calc{ background:rgba(62,67,70,0.10); color:var(--slate); }
  .tag.tool{ background:rgba(126, 184, 231, 0.14); color:#155385; }

  .card h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:17px;
    font-weight:600;
    margin-bottom:8px;
  }
  .card p{
    font-size:13.5px;
    line-height:1.55;
    color:#5C6163;
    flex-grow:1;
  }

  .card-footer{
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-top:1px solid var(--line);
    padding-top:14px;
  }
  .updated{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:#9A9E9F;
  }
  .open-btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    color:var(--slate-deep);
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .open-btn:hover{ color:var(--green); }

  .empty-note{
    grid-column:1/-1;
    border:1px dashed var(--line);
    padding:26px;
    font-size:13px;
    color:#8A8E90;
    text-align:center;
  }

  footer{
    padding:22px 6vw 40px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.5px;
    color:#9A9E9F;
    text-align:center;
  }

  @media (max-width:520px){
    header{ padding:30px 6vw 24px; }
    .wordmark{ font-size:22px; }
  }
</style>
</head>

     tag   -> "proj" (πράσινο), "draw" (κίτρινο) ή "calc" (γκρι)
     Δεν χρειάζεται να αγγίξεις τίποτα άλλο στο αρχείο.
  ============================================================ */
  const TOOLS = [
    {
      title: "Project Reference List",
      tag: "proj",
      tagLabel: "Έργα",
      description: "Λίστα έργων της Alumil Solar με φιλτράρισμα ανά πελάτη και χώρα, flagship projects και εξαγωγή σε branded PDF.",
      file: "tools/alumil-solar-references.html",
      updated: "Ιούλ 2026"
    },
    {
      title: "Fast Table Designer",
      tag: "draw",
      tagLabel: "Σχέδια",
      description: "Σχεδίαση layout τραπεζών PV με αυτόματο υπολογισμό προβόλων, υποστήριξη πολλαπλών τραπεζών και εξαγωγή σε PDF.",
      file: "tools/fast-table-designer.html",
      updated: "Ιούλ 2026"
    },
    {
      title: "SS199 BoM Calculator",
      tag: "calc",
      tagLabel: "Υπολογισμοί",
      description: "Υπολογισμός Bill of Materials για συστήματα στήριξης SS199 — ποσότητες purlin, πασσάλων, τιμολόγηση ανά κωδικό.",
      file: "tools/ss199-bom-calculator.html",
      updated: "Νοε 2025"
    },
    {
      title: "Letter Designer",
      tag: "tool",
      tagLabel: "Ετικέτες",
      description: "Δημιουργία επιστολών και report με ευκολο τροπο. ",
      file: "tools/alumil_letter_designer.html",
      updated: "Ιούλ 2026"
    }
    ,
     {
      title: "Label Maker Pro",
      tag: "tool",
      tagLabel: "Ετικέτες",
      description: "Δημιουργία ετικετών με ευκολο τροπο.",
      file: "tools/label_maker_pro.html",
      updated: "Ιούλ 2026"
    }
    ,
     {
      title: "PDF Editor",
      tag: "tool",
      tagLabel: "PDF Tool",
      description: "Τροποποίησε ευκολά τα PDF χωρίς την βοήθεια του Marketing ",
      file: "tools/pdf_editor.html",
      updated: "Μαι 2026"
    }

    // Παράδειγμα προσθήκης νέου εργαλείου:
    // {
    //   title: "Όνομα Εργαλείου",
    //   tag: "calc",
    //   tagLabel: "Υπολογισμοί",
    //   description: "Σύντομη περιγραφή σε 1-2 προτάσεις.",
    //   file: "tools/onoma-ergaleiou.html",
    //   updated: "Μήνας Έτος"
    // }
  ];

  const grid = document.getElementById('grid');

  if (TOOLS.length === 0) {
    grid.innerHTML = '<div class="empty-note">Δεν έχουν προστεθεί εργαλεία ακόμα.</div>';
  } else {
    TOOLS.forEach(t => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = t.file;
      card.target = '_blank';
      card.rel = 'noopener';
      card.style.textDecoration = 'none';
      card.style.color = 'inherit';
      card.innerHTML = `
        <div class="corner tl"></div>
        <div class="corner br"></div>
        <div class="tag ${t.tag}">${t.tagLabel}</div>
        <h2>${t.title}</h2>
        <p>${t.description}</p>
        <div class="card-footer">
          <span class="updated">${t.updated}</span>
          <span class="open-btn">Άνοιγμα →</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // ruler ticks
  const ruler = document.getElementById('ruler');
  for (let i = 0; i < 28; i++) {
    const tick = document.createElement('div');
    tick.className = 'tick';
    ruler.appendChild(tick);
  }
</script>

</body>
